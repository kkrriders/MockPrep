services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (single Express process on :3000) ─────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/mockprep
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3002
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/app/logs

  # ── Frontend (Next.js on :3002) ───────────────────────────────────────────────
  # Requires frontend/Dockerfile — see frontend/package.json for build details.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js client bundle — must be reachable from the browser
        NEXT_PUBLIC_API_URL: http://localhost:3000
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      backend: { condition: service_healthy }

  # ── Optional: Jaeger distributed tracing ─────────────────────────────────────
  # Enable with: docker compose --profile tracing up
  # UI at http://localhost:16686 — set OTEL_ENABLED=true in .env to activate.

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["tracing"]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "16686:16686" # Jaeger web UI

volumes:
  mongo_data:
  redis_data:
