services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (Express on :3000, internal only) ─────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/mockprep
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      # Set FRONTEND_URL in .env to your actual domain e.g. https://yourdomain.com
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/app/logs

  # ── Frontend (Next.js on :3002, internal only) ────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Must be the public domain — baked into the Next.js client bundle at build time
        # Set this to https://yourdomain.com (nginx proxies /api/* to backend)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend: { condition: service_healthy }

  # ── Nginx reverse proxy (public: 80 + 443) ────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

  # ── Certbot (run once to issue / renew SSL cert) ──────────────────────────────
  # Usage: docker compose run --rm certbot
  # Renewal: docker compose run --rm certbot renew  (add to cron weekly)

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email YOUR_EMAIL
      --agree-tos
      --no-eff-email
      -d YOUR_DOMAIN
    profiles: ["ssl"]

  # ── Optional: Jaeger distributed tracing ─────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["tracing"]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4318:4318"
      - "16686:16686"

volumes:
  mongo_data:
  redis_data:
  certbot_certs:
  certbot_www:
